# Lancer tout : docker compose up --build
# Variables : fichier .env à la racine (SITE PERSONA), mêmes clés que mqb/.env.example
# Base vide (premier admin) : docker compose exec frontend npx tsx src/bootstrap.ts

services:
  backend:
    build:
      context: ./mqb-backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      DATABASE_PATH: /data/database.db
    volumes:
      - mqb_backend_data:/data

  frontend:
    build:
      context: ./mqb
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_APP_NAME: MQB
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:./data/database.db
      # En prod NODE_ENV, sans cela le cookie auth est Secure et ignoré sur http://localhost
      AUTH_COOKIE_INSECURE: "1"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-MQB}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_FIRST_NAME: ${BOOTSTRAP_ADMIN_FIRST_NAME:-}
      BOOTSTRAP_ADMIN_LAST_NAME: ${BOOTSTRAP_ADMIN_LAST_NAME:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-}
      EMAIL_FROM_EMAIL: ${EMAIL_FROM_EMAIL:-}
    volumes:
      - mqb_frontend_data:/app/data
    depends_on:
      - backend

volumes:
  mqb_backend_data:
  mqb_frontend_data:
