services:
  - type: web
    name: mieux-que-brad
    runtime: node
    plan: free
    buildCommand: >
      cd mqb &&
      npm install --legacy-peer-deps &&
      npm run build
    startCommand: "cd mqb && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./data/mqb.db
      - key: NEXTAUTH_SECRET
        value: mqb-dev-jwt-secret-changez-moi-en-production-2026
      - key: NEXTAUTH_URL
        value: https://mieux-que-brad.onrender.com
      - key: PORT
        value: 3000
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/mqb/data
      sizeGB: 1
